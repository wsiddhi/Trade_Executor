<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tradex | Financial Dashboard</title>
  <base href="/">

  <!-- Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Tradex - Your live financial trade execution and analysis dashboard.">
  
  <!-- Browser Theme Color -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    
    /* Simple centered loader */
    #loader-wrapper {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff;
      display: flex; justify-content: center; align-items: center;
      z-index: 9999;
    }
    
    @media (prefers-color-scheme: dark) {
      #loader-wrapper { background: #121212; }
    }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0d6efd;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading State -->
  <div id="loader-wrapper">
    <div class="spinner"></div>
  </div>

  <app-root></app-root>

  <script>
    // Remove loader once app is ready
    window.addEventListener('load', () => {
      const loader = document.getElementById('loader-wrapper');
      loader.style.opacity = '0';
      loader.style.transition = 'opacity 0.3s ease';
      setTimeout(() => loader.remove(), 300);
    });
  </script>
</body>
</html>
